; =============================================================================
; Project Settings to add to your project.godot
; Copy these lines into the relevant sections of your project.godot file
; =============================================================================

; --- Under [application] ---
; (no changes needed)

; --- Under [display] ---
; Recommended portrait mobile resolution
window/size/viewport_width=480
window/size/viewport_height=854
window/stretch/mode="canvas_items"
window/stretch/aspect="expand"

; --- Under [gui] ---
; Set Fredoka as default UI font
theme/custom_font="res://common/ui/fonts/Fredoka-Medium.ttf"

; --- Under [rendering] ---
; Mobile-friendly settings
renderer/rendering_method="mobile"
textures/vram_compression/import_etc2_astc=true
